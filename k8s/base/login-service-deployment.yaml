apiVersion: apps/v1
kind: Deployment
metadata:
  name: login-service
  labels:
    app.kubernetes.io/name: geek-hub
    app.kubernetes.io/component: login-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: geek-hub
      app.kubernetes.io/component: login-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: geek-hub
        app.kubernetes.io/component: login-service
        app.kubernetes.io/part-of: geek-hub
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: login-service
          image: geek-hub-login-service:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: login-service-config
            - secretRef:
                name: geek-hub-secret
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
