apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: realtime-gateway
  labels:
    app.kubernetes.io/name: geek-hub
    app.kubernetes.io/component: realtime-gateway
    release: observability-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: geek-hub
      app.kubernetes.io/component: realtime-gateway
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
