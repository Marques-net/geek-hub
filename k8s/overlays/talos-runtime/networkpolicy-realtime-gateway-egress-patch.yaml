apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: realtime-gateway-egress
spec:
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: geek-hub
              app.kubernetes.io/component: match-core
      ports:
        - protocol: TCP
          port: 50052
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchExpressions:
              - key: k8s-app
                operator: In
                values:
                  - kube-dns
                  - coredns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
