apiVersion: apps/v1
kind: Deployment
metadata:
  name: mega-sena-service
  labels:
    app.kubernetes.io/name: geek-hub
    app.kubernetes.io/component: mega-sena-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: geek-hub
      app.kubernetes.io/component: mega-sena-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: geek-hub
        app.kubernetes.io/component: mega-sena-service
        app.kubernetes.io/part-of: geek-hub
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: mega-sena-service-build
          image: golang:1.24-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -lc
          args:
            - >
              set -eux &&
              export PATH="/usr/local/go/bin:/workspace/.gopath/bin:${PATH}" &&
              export HOME="/workspace" &&
              export TMPDIR="/tmp" &&
              export GOPATH="/workspace/.gopath" &&
              export GOCACHE="/workspace/.gocache" &&
              export GOMODCACHE="/workspace/.gopath/pkg/mod" &&
              cp -R /src/. /workspace &&
              cd /workspace &&
              mkdir -p /workspace/bin &&
              CGO_ENABLED=0 GOOS=linux GOARCH=amd64 /usr/local/go/bin/go build -mod=mod -o /workspace/bin/mega-sena-service ./cmd/mega-sena-service
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 700m
              memory: 1Gi
          volumeMounts:
            - name: mega-sena-service-source
              mountPath: /src
              readOnly: true
            - name: workspace
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
      containers:
        - name: mega-sena-service
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          command:
            - /workspace/bin/mega-sena-service
          envFrom:
            - configMapRef:
                name: login-service-config
            - secretRef:
                name: geek-hub-secret
          env:
            - name: OTEL_SERVICE_NAME
              value: geek-hub-mega-sena-service
          ports:
            - name: http
              containerPort: 3000
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: mega-sena-service-source
          configMap:
            name: mega-sena-service-source
            items:
              - key: go.mod
                path: go.mod
              - key: go.sum
                path: go.sum
              - key: main.go
                path: cmd/mega-sena-service/main.go
              - key: config.go
                path: internal/mega/config.go
              - key: repository.go
                path: internal/mega/repository.go
              - key: telemetry.go
                path: internal/observability/telemetry.go
        - name: workspace
          emptyDir: {}
        - name: tmp
          emptyDir: {}
