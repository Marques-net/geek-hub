apiVersion: apps/v1
kind: Deployment
metadata:
  name: login-service
spec:
  template:
    spec:
      initContainers:
        - name: login-service-build
          image: golang:1.24-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -lc
          args:
            - >
              set -eux &&
              test -x /usr/local/go/bin/go &&
              export PATH="/usr/local/go/bin:/workspace/.gopath/bin:${PATH}" &&
              export HOME="/workspace" &&
              export TMPDIR="/tmp" &&
              export GOPATH="/workspace/.gopath" &&
              export GOCACHE="/workspace/.gocache" &&
              export GOMODCACHE="/workspace/.gopath/pkg/mod" &&
              /usr/local/go/bin/go version &&
              cp -R /src/. /workspace &&
              cd /workspace &&
              mkdir -p /workspace/bin &&
              CGO_ENABLED=0 GOOS=linux GOARCH=amd64 /usr/local/go/bin/go build -mod=mod -o /workspace/bin/login-service ./cmd/login-service
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 700m
              memory: 1Gi
          volumeMounts:
            - name: login-service-source
              mountPath: /src
              readOnly: true
            - name: workspace
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
      containers:
        - name: login-service
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          command:
            - /workspace/bin/login-service
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: login-service-source
              mountPath: /src
              readOnly: true
            - name: workspace
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: login-service-source
          configMap:
            name: login-service-source
            items:
              - key: go.mod
                path: go.mod
              - key: main.go
                path: cmd/login-service/main.go
              - key: config.go
                path: internal/login/config.go
              - key: metrics.go
                path: internal/login/metrics.go
              - key: repository.go
                path: internal/login/repository.go
              - key: telemetry.go
                path: internal/observability/telemetry.go
        - name: workspace
          emptyDir: {}
        - name: tmp
          emptyDir: {}
